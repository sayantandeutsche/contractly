# =============================================================
# application.properties
# Replace the datasource values with your Aurora endpoint + password
# =============================================================

# ── Server ────────────────────────────────────────────────────
server.port=8080

# ── Aurora PostgreSQL datasource ──────────────────────────────
spring.datasource.url=jdbc:postgresql://crm-dev-cluster-instance-1.cf02k0sq0l6x.eu-west-1.rds.amazonaws.com:5432/crm_dev?sslmode=require
spring.datasource.username=crm_admin
spring.datasource.password=REPLACE_WITH_YOUR_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Connection pool (HikariCP) ────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_schema=crm
spring.jpa.properties.hibernate.format_sql=true

# ── CORS (allow React dev server) ────────────────────────────
crm.cors.allowed-origins=http://localhost:3000

# ── Tenant (hardcoded for single-tenant dev mode) ────────────
# In production this comes from JWT. For dev, set your tenant UUID here.
crm.default-tenant-id=11111111-0000-0000-0000-000000000001

# ── Logging ───────────────────────────────────────────────────
logging.level.com.crm=INFO
logging.level.org.hibernate.SQL=WARN
